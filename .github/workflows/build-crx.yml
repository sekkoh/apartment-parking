name: Build CRX

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Node 20 ランタイム廃止に合わせ、JS アクションを Node 24 で実行（サードパーティ含む）
    # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - name: Pack extension directory to zip
        id: pack
        uses: cardinalby/webext-buildtools-pack-extension-dir-action@v1
        with:
          extensionDir: "."
          zipFilePath: build/extension.zip
          zipIgnore: "*.pem|.git|*.crx|README.md|.gitignore|.github/**"

      - name: Sign zip to crx
        id: chrome-crx
        uses: cardinalby/webext-buildtools-chrome-crx-action@v2
        with:
          zipFilePath: build/extension.zip
          crxFilePath: build/extension.crx
          privateKey: ${{ secrets.CHROME_CRX_PRIVATE_KEY }}

      - name: Upload crx artifact
        uses: actions/upload-artifact@v7
        with:
          name: extension-crx
          path: build/extension.crx

      - name: Create GitHub Release with crx
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: build/extension.crx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
